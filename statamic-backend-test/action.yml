name: "Statamic Backend Test"
description: "Runs composer install + static analysis for Statamic projects"

inputs:
  php-version:
    description: "PHP version"
    required: false
    default: "8.3"

  composer-auth:
    description: "Composer auth.json content"
    required: true

runs:
  using: "composite"
  steps:

    - name: 🧾 Checkout Code
      uses: actions/checkout@v6
      with:
        fetch-depth: 1

    - name: 🧪 Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ inputs.php-version }}
        extensions: mbstring, xml, ctype

    - name: Cache vendor
      uses: actions/cache@v4
      with:
        path: |
          vendor
          ~/.composer/cache
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-

    - name: Setup COMPOSER_AUTH
      run: |
        set -euo pipefail
        mkdir -p ~/.config/composer
        printf "%s" '${{ inputs.composer-auth }}' > ~/.config/composer/auth.json
      shell: bash

    - name: 📦 Install Composer Dependencies
      run: |
        set -euo pipefail
        composer install \
          --no-interaction \
          --no-progress \
          --prefer-dist \
          --no-scripts \
          --optimize-autoloader
      shell: bash

    - name: Static Analysis
      run: |
        set -euo pipefail

        echo "Running PHPCS..."
        php vendor/bin/phpcs

        echo "Running PHPStan..."
        php vendor/bin/phpstan
      shell: bash