---
name: Statamic Addon CI

on:
  workflow_call:
    secrets:
      SLACK_WEBHOOK_URL_PULL_REQUESTS:
        required: false

concurrency:
  group: addon-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [8.5]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, pgsql, gd, exif, amqp
          coverage: none

      - name: Composer validate
        run: composer validate --strict

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer downloads
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ runner.os }}-php-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-php-${{ matrix.php }}-

      - name: Cache vendor
        uses: actions/cache@v5
        with:
          path: vendor
          key: vendor-${{ runner.os }}-php-${{ matrix.php }}-${{ hashFiles('composer.json') }}

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --no-scripts --optimize-autoloader

      - name: Lint PHP files
        run: |
          find . \
            -type f \
            -name "*.php" \
            -not -path "./vendor/*" \
            -exec php -l {} \;

      - name: Check forbidden PHP functions
        run: |
          if grep -R --include="*.php" --exclude-dir=vendor -E "eval\(|shell_exec\(|exec\(|system\(|passthru\(" .; then
            echo "❌ Forbidden functions detected in PHP files!";
            exit 1;
          else
            echo "✅ Geen verboden functies gevonden.";
          fi

      - name: Composer security audit
        run: composer audit

      - name: PHP CodeSniffer
        run: |
          if [ -f vendor/bin/phpcs ]; then
            vendor/bin/phpcs
          else
            echo "⚠️ PHP_CodeSniffer niet geïnstalleerd; overgeslagen."
          fi

      - name: PHPStan
        run: |
          if [ -f vendor/bin/phpstan ]; then
            vendor/bin/phpstan analyse
          else
            echo "⚠️ PHPStan niet geïnstalleerd; overgeslagen."
          fi

      - name: PHPUnit tests
        run: |
          if [ ! -f vendor/bin/phpunit ]; then
            echo "⚠️ PHPUnit niet geïnstalleerd; tests overgeslagen."
            exit 0
          fi

          if [ ! -d tests ]; then
            echo "⚠️ Geen tests/ directory gevonden; PHPUnit overgeslagen."
            exit 0
          fi

          if ! find tests -type f -name "*Test.php" | grep -q .; then
            echo "⚠️ Geen testbestanden gevonden in tests/; PHPUnit overgeslagen."
            exit 0
          fi

          vendor/bin/phpunit --testdox

  pr-ready:
    name: PR Ready Notification
    runs-on: ubuntu-latest
    if: >
      success() &&
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.base.ref != 'acceptance' &&
      github.event.pull_request.base.ref != 'main' &&
      !contains(github.event.pull_request.labels.*.name, 'release')
    needs: [check]

    steps:
      - name: Notify PR ready
        uses: finetic/deployers/slack-notify@main
        with:
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL_PULL_REQUESTS }}
          message: |
            👀 PR klaar voor review
            Project: ${{ github.event.repository.name }}
            PR: ${{ github.event.pull_request.title }}
            Auteur: ${{ github.actor }}
            Link: ${{ github.event.pull_request.html_url }}
