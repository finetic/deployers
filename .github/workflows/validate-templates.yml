---
name: Validate Workflow Templates

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/**.yml'
      - '.github/workflows/**.yaml'
  pull_request:
    paths:
      - '.github/workflows/**.yml'
      - '.github/workflows/**.yaml'

jobs:
  validate:
    name: Check syntax & structure
    runs-on: ubuntu-latest
    concurrency:
      group: validate-templates-${{ github.repository }}-${{ github.workflow }}-${{ github.ref }}-validate
      cancel-in-progress: true

    steps:
      - name: 🧾 Checkout Code (eerste poging)
        uses: actions/checkout@v6
        continue-on-error: true

      - name: 🔁 Retry Checkout (indien eerste faalt)
        if: failure()
        uses: actions/checkout@v6

      - name: 🛠️ Download yamllint config vanuit deployers
        run: |
          curl -sL https://raw.githubusercontent.com/finetic/deployers/main/.yamllint.yml -o .yamllint.yml

      - name: Check workflow YAML syntax
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yml

      - name: Require reusable workflow entrypoints
        run: |
          required_workflows=(
            ".github/workflows/dependencytrack-composer.yaml"
            ".github/workflows/dependencytrack-maven.yaml"
            ".github/workflows/dependencytrack-npm.yaml"
            ".github/workflows/dependencytrack-python.yaml"
            ".github/workflows/statamic-addon.yml"
            ".github/workflows/versioning.yml"
          )

          missing=0
          for workflow in "${required_workflows[@]}"; do
            if [[ ! -f "$workflow" ]]; then
              echo "Missing expected reusable workflow: $workflow"
              missing=1
            fi
          done

          exit "$missing"
